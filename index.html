<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDO.Ninja Hand Controlled 3D Shape with Sound</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            max-width: 320px;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            transform: scaleX(-1);
        }
        video {
            width: 200px;
            height: auto;
            display: block;
        }
        h2 { margin-top: 0; font-size: 1.2rem; color: #00ffcc; }
        p { font-size: 0.9rem; line-height: 1.4; color: #ddd; }
        .status {
            font-weight: bold;
            color: #ffcc00;
            margin-top: 10px;
        }
        .instructions {
            border-left: 3px solid #00ffcc;
            padding-left: 10px;
            margin-top: 15px;
        }
        .btn {
            background: #00ffcc;
            color: #111;
            border: none;
            padding: 12px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover { background: #00ccaa; }
        
        .shape-selector {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .shape-btn {
            flex: 1;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .shape-btn.active {
            background: #00ffcc;
            color: #111;
            border-color: #00ffcc;
        }
        .audio-note {
            font-size: 0.75rem;
            color: #ffcc00;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <h2>VDO.Ninja Controller</h2>
        <p>Use an external VDO.Ninja tab as your webcam source.</p>
        
        <button class="btn" onclick="startTabCapture()">Connect VDO.Ninja Tab</button>
        
        <div id="status" class="status">Click the button to select your VDO.Ninja tab...</div>
        
        <div class="shape-selector">
            <button class="shape-btn active" id="btn-cube" onclick="changeShape('cube')">Cube</button>
            <button class="shape-btn" id="btn-sphere" onclick="changeShape('sphere')">Sphere</button>
            <button class="shape-btn" id="btn-torus" onclick="changeShape('torus')">Torus</button>
        </div>
        <p class="audio-note">🔊 Audio initializes automatically when hand tracking scales the shape.</p>

        <div class="instructions">
            <p><strong>Left Hand:</strong> Change size & pitch (Pinch fingers)</p>
            <p><strong>Right Hand:</strong> Move shape (Move hand around)</p>
        </div>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');

        let targetX = 0, targetY = 0, targetScale = 1;
        let currentMesh;

        // --- AUDIO ENGINE SETUP (Web Audio API) ---
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;

        function initAudio() {
            if (audioCtx) return; // Already running
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            // Smoothly default to baseline frequency
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); 
            
            // Start silent to prevent sudden audio bursts
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime); 
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function updateAudioPitch(scaleValue) {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Map scale values (roughly 0.2 to 3.5) to frequencies (150Hz to 800Hz)
            const minScale = 0.2;
            const maxScale = 3.5;
            const minFreq = 150;
            const maxFreq = 750;

            // Linear clamp and mapping logic
            const normalized = (scaleValue - minScale) / (maxScale - minScale);
            const targetFrequency = minFreq + (Math.max(0, Math.min(1, normalized)) * (maxFreq - minFreq));

            // Smooth out frequency transitions over 0.1 seconds to avoid audio popping
            oscillator.frequency.setTargetAtTime(targetFrequency, audioCtx.currentTime, 0.1);
            
            // Dynamically set gain higher when tracking is running, down when static
            gainNode.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.1);
        }

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x666666));
        const directionalLight = new THREE.DirectionalLight(0x00ffcc, 1);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        // Predefine Shared Object Material
        const material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.2 });

        // Geometry Generation Repository
        const geometries = {
            cube: new THREE.BoxGeometry(1.5, 1.5, 1.5),
            sphere: new THREE.SphereGeometry(1.0, 32, 32),
            torus: new THREE.TorusGeometry(0.7, 0.3, 16, 100)
        };

        // Initialize with default Cube Shape
        currentMesh = new THREE.Mesh(geometries.cube, material);
        scene.add(currentMesh);

        // Function to Swap Out Geometries dynamically
        function changeShape(shapeType) {
            if (!geometries[shapeType]) return;
            
            // Swap out mesh parameters inline retaining positional spatial tracking
            currentMesh.geometry.dispose();
            currentMesh.geometry = geometries[shapeType];

            // Toggle active styling states inside DOM UI controls
            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${shapeType}`).classList.add('active');
        }

        // --- MEDIAPIPE HANDS SETUP ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        function onResults(results) {
            statusElement.innerText = "Tracking Active!";
            statusElement.style.color = "#00ffcc";

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const isLeftHand = results.multiHandedness[i].label === 'Left';

                    if (isLeftHand) {
                        const distance = Math.sqrt(
                            Math.pow(landmarks[4].x - landmarks[8].x, 2) +
                            Math.pow(landmarks[4].y - landmarks[8].y, 2)
                        );
                        targetScale = Math.max(0.2, Math.min(3.5, distance * 8));
                        
                        // Push changes to the audio module
                        updateAudioPitch(targetScale);
                    } else {
                        targetX = -(landmarks[5].x - 0.5) * 7; 
                        targetY = -(landmarks[5].y - 0.5) * 5; 
                    }
                }
            }
        }

        // --- SCREEN/TAB CAPTURE SYSTEM ---
        async function startTabCapture() {
            try {
                statusElement.innerText = "Selecting source...";
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never", displaySurface: "browser" },
                    audio: false
                });

                videoElement.srcObject = stream;
                statusElement.innerText = "Connected! Initializing AI tracking...";
                statusElement.style.color = "#ffcc00";

                videoElement.addEventListener('loadedmetadata', () => {
                    const processVideo = async () => {
                        if (!stream.active) {
                            statusElement.innerText = "Stream disconnected.";
                            statusElement.style.color = "#ff3333";
                            if(gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                            return;
                        }
                        await hands.send({ image: videoElement });
                        requestAnimationFrame(processVideo);
                    };
                    processVideo();
                });

            } catch (err) {
                statusElement.innerText = "Connection failed: " + err.message;
                statusElement.style.color = "#ff3333";
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (currentMesh) {
                currentMesh.position.x += (targetX - currentMesh.position.x) * 0.1;
                currentMesh.position.y += (targetY - currentMesh.position.y) * 0.1;
                
                const currentScale = currentMesh.scale.x;
                const newScale = currentScale + (targetScale - currentScale) * 0.1;
                currentMesh.scale.set(newScale, newScale, newScale);

                currentMesh.rotation.x += 0.01;
                currentMesh.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
